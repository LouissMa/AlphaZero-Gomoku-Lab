name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip ".[dev]"

      - name: Run game-engine tests
        run: python -m pytest

      - name: Run Ruff
        if: matrix.python-version == '3.13'
        run: ruff check alphazero_gomoku/cli.py alphazero_gomoku/__main__.py alphazero_gomoku/evaluation tests

      - name: Smoke-test CLI
        run: python -m alphazero_gomoku doctor
